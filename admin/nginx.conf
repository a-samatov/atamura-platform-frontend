# --- Rate limiting: защита API от брутфорса и случайных флудов ---------------
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;

# --- Кеш для /uploads/ на диске nginx ----------------------------------------
proxy_cache_path /var/cache/nginx/uploads
    levels=1:2
    keys_zone=uploads_cache:10m
    max_size=512m
    inactive=30d
    use_temp_path=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Скрываем версию nginx в ответах и error-страницах
    server_tokens off;

    add_header X-Frame-Options          "DENY"                             always;
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # / → редирект на /admin/
    # -------------------------------------------------------------------------
    location = / {
        return 301 /admin/;
    }

    location = /admin/index.html {
        add_header Cache-Control           "no-cache, no-store, must-revalidate" always;
        add_header Pragma                  "no-cache"                             always;
        add_header X-Frame-Options         "DENY"                                always;
        add_header X-Content-Type-Options  "nosniff"                             always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"     always;
    }

    location /admin/assets/ {
        try_files $uri =404;

        expires 1y;
        add_header Cache-Control           "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options  "nosniff"                             always;

        # Статика не нужна в access-логах — только шум
        access_log off;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;

        add_header X-Frame-Options         "DENY"                            always;
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    }

    location /api/ {
        # Rate limit: burst 50 позволяет моментальные всплески запросов,
        # nodelay — не ставить их в очередь, а сразу вернуть 429 при превышении
        limit_req zone=api_zone burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # Keepalive к бэкенду — меньше TCP-хендшейков под нагрузкой
        proxy_set_header Connection "";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout  5s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;

        # Для загрузки файлов через API (изображения, документы)
        client_max_body_size 25m;

        # API-ответы не кешировать на клиенте
        add_header Cache-Control "no-store" always;
    }

    location /uploads/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;

        # Nginx-сайд кеш
        proxy_cache                 uploads_cache;
        proxy_cache_valid           200 30d;
        proxy_cache_valid           404 1m;
        # Отдаём закешированное если бэкенд лёг или тупит
        proxy_cache_use_stale       error timeout updating http_500 http_502 http_503 http_504;
        # Обновляем кеш в фоне, не блокируя текущий запрос
        proxy_cache_background_update on;
        # Один запрос к бэкенду при cache MISS, остальные ждут
        proxy_cache_lock            on;

        # Заголовок для отладки: HIT / MISS / EXPIRED / BYPASS
        add_header X-Cache-Status   $upstream_cache_status always;

        # Браузерный кеш
        expires 7d;
        add_header Cache-Control    "public, max-age=604800" always;

        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------------
    # Gzip-сжатие
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;   # Vary: Accept-Encoding — для корректной работы CDN/прокси
    gzip_min_length   1024; # Файлы меньше 1 КБ сжимать бессмысленно
    gzip_comp_level   6;    # Баланс CPU/степень сжатия (1=быстро, 9=медленно)
    gzip_proxied      any;  # Сжимать и проксированные ответы
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;
}