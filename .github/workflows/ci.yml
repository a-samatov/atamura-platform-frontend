name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Admin unit tests ──────────────────────────────────────────────────────────
jobs:
  unit-admin:
    name: Admin — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: admin/coverage/

# ── Client unit tests ─────────────────────────────────────────────────────────
  unit-client:
    name: Client — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: client/coverage/

# ── Type-check ────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript — type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install admin deps
        run: npm ci
        working-directory: admin

      - name: Type-check admin
        run: npx vue-tsc --noEmit
        working-directory: admin

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Type-check client
        run: npx nuxi typecheck
        working-directory: client

# ── E2E — Client ──────────────────────────────────────────────────────────────
  e2e-client:
    name: Client — E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit-client
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Nuxt app
        run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: ''
          NODE_OPTIONS: '--max-old-space-size=6144'

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-playwright-report
          path: client/playwright-report/

# ── E2E — Admin ───────────────────────────────────────────────────────────────
# Spins up an ephemeral backend stack (postgres + redis + backend image from GHCR)
# so tests run against a real API without touching production.
  e2e-admin:
    name: Admin — E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit-admin

    steps:
      - uses: actions/checkout@v4

      # ── Backend stack ──────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GHCR_TOKEN: fine-grained PAT with read:packages scope,
          # stored as a repository secret in atamura-platform-frontend.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Start backend stack (postgres + redis + backend)
        run: docker compose -f docker-compose.ci.yml up -d --wait
        timeout-minutes: 5

      - name: Verify backend login endpoint
        run: |
          curl -sf -X POST http://localhost:8080/api/admin/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@atamuragroup.kz","password":"admin123"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('LOGIN OK, token length:', len(d.get('access_token','')))"

      # ── Admin app ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Install Playwright browsers
        working-directory: admin
        run: npx playwright install --with-deps chromium

      - name: Build admin app
        working-directory: admin
        run: npm run build

      - name: Run E2E tests
        working-directory: admin
        run: npm run test:e2e
        env:
          CI: true
          TEST_ADMIN_EMAIL:    ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          # Tells vite preview to proxy /api → http://localhost:8080
          VITE_API_TARGET: http://localhost:8080

      - name: Print backend logs (debug)
        if: always()
        run: docker logs atamura-platform-frontend-backend-1 2>&1 || true

      - name: Stop backend stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-report
          path: admin/playwright-report/
